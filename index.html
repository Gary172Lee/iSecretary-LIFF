<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-inline' https://static.line-scdn.net; 
                   style-src 'self' 'unsafe-inline'; 
                   img-src 'self' data: https://profile.line-scdn.net; 
                   connect-src 'self' https://*.line.me https://*.line-apps.com https://*.line-scdn.net;">

    <title>i秘書 - 專屬串接碼領取中心</title>
    
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    
    <style>
        body {
            background-color: #0D1B2A;
            color: #FFFFFF;
            font-family: 'Helvetica Neue', Helvetica, Arial, '微軟正黑體', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .header-icon { font-size: 50px; margin-top: 20px; margin-bottom: 10px; }
        .card {
            background-color: #1B263B;
            border-radius: 12px;
            padding: 25px 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            margin-top: 20px;
        }
        .greeting { font-size: 1.1em; color: #A8DADC; margin-bottom: 15px; }
        .uid-box {
            background-color: #E0E1DD;
            color: #0D1B2A;
            padding: 15px 10px;
            font-family: monospace;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            margin: 20px 0;
            word-break: break-all;
            border: 2px dashed #415A77;
        }
        .copy-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .copy-btn:active { background-color: #45a049; }
        .instructions {
            text-align: left;
            margin-top: 25px;
            font-size: 0.9em;
            color: #E0E1DD;
            line-height: 1.6;
            background-color: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-icon">🛡️</div>
    <h2>i秘書 服務開通中心</h2>
    
    <div class="card">
        <div id="greetingMsg" class="greeting">驗證安全環境中...</div>
        <div style="font-size: 0.9em; color: #778DA9;">您的專屬系統串接碼為：</div>
        
        <div id="uidDisplay" class="uid-box">讀取中...</div>
        
        <button id="copyBtn" class="copy-btn" onclick="copyUID()">點我複製串接碼</button>
    </div>

    <div class="instructions">
        <strong>📌 下一步開通流程：</strong><br>
        1. 點擊上方綠色按鈕複製串接碼。<br>
        2. 將「串接碼」貼入信件中並寄送。<br>
        📧 <strong>gary172.leejpa@gmail.com</strong><br>
        3. 信件主旨請註明：<strong>開通 i秘書</strong>
    </div>
</div>

<script>
    // ⚠️ 請務必將下方的字串替換為您專屬的 LIFF ID (例如: 2006xxxxxx-xxxxxxx)
    const myLiffId = "2009535679-qOnxrVXQ"; 
    
    let currentUID = "";

    liff.init({ liffId: myLiffId })
        .then(() => {
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                liff.getProfile().then(profile => {
                    document.getElementById('greetingMsg').textContent = `親愛的 ${profile.displayName} 您好：`;
                    currentUID = profile.userId;
                    document.getElementById('uidDisplay').textContent = currentUID;
                }).catch(err => {
                    document.getElementById('uidDisplay').textContent = "讀取失敗";
                    console.error("取得 Profile 失敗:", err);
                });
            }
        })
        .catch((err) => {
            document.getElementById('uidDisplay').textContent = "系統初始化失敗";
            console.error("LIFF 初始化失敗:", err);
        });

    function copyUID() {
        if (!currentUID) return;
        navigator.clipboard.writeText(currentUID).then(() => {
            const btn = document.getElementById('copyBtn');
            btn.textContent = "✅ 複製成功！";
            btn.style.backgroundColor = "#1E90FF";
            setTimeout(() => {
                btn.textContent = "點我複製串接碼";
                btn.style.backgroundColor = "#4CAF50";
            }, 3000);
        });
    }
</script>

</body>
</html>
