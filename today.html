        .tech-data-title { color: #FCA311; font-weight: bold; margin-top: 10px; display: block; }

        .copy-btn { cursor: pointer; background: #415A77; color: #FFFFFF; border: none; border-radius: 5px; padding: 4px 10px; margin-left: 12px; font-size: 0.85em; display: inline-flex; align-items: center; transition: background 0.3s; }

    </div></div>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const expectedToken = "017d144c";
            const urlParams = new URLSearchParams(window.location.search);
            const userToken = urlParams.get('token');
            
            if (userToken === expectedToken) {
                document.getElementById("loading-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                
                var hash = window.location.hash;
                if (hash) {
                    var targetElement = document.querySelector(hash);
                    if (targetElement && targetElement.tagName === 'DETAILS') {
                        targetElement.setAttribute('open', '');
                        setTimeout(function() {
                            targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetElement.style.transition = "background-color 0.8s";
                            targetElement.style.backgroundColor = "rgba(30, 144, 255, 0.3)";
                            setTimeout(() => { targetElement.style.backgroundColor = "transparent"; }, 1500);
                        }, 300);
                    }
                }
            } else {
                document.getElementById("loading-screen").style.display = "none";
                document.getElementById("access-denied").style.display = "block";
            }
        });

        function copyPrompt(event, elementId) {
            event.stopPropagation();
            var promptText = document.getElementById(elementId).innerText;
            
            navigator.clipboard.writeText(promptText).then(function() {
                alert('✅ 提示詞已成功複製到剪貼簿！');
            }).catch(function(err) {
                alert('❌ 複製失敗，請手動選取文字進行複製。');
            });
        }
    </script>
    
</body></html>
